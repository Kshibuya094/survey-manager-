<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アンケート回答状況チェック</title>

<!-- Firebase SDK（※この2行は絶対そのまま） -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<style>
body {
  font-family: 'Helvetica Neue', Arial, sans-serif;
  background: #f3f4f6;
  margin: 0;
  padding: 20px;
}
.container {
  max-width: 960px;
  margin: auto;
  background: #fff;
  padding: 30px;
  border-radius: 12px;
}
h1 {
  text-align: center;
  margin-bottom: 20px;
}
.input-group {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}
input {
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 6px;
}
.add-btn {
  background: #2563eb;
  color: #fff;
  border: none;
  padding: 10px 16px;
  border-radius: 6px;
  cursor: pointer;
}
table {
  width: 100%;
  border-collapse: collapse;
}
th, td {
  padding: 12px;
  text-align: center;
  border-bottom: 1px solid #eee;
}
th {
  background: #f9fafb;
}
.status-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
}
.unanswered {
  background: #fee2e2;
  color: #ef4444;
}
.answered {
  background: #dcfce7;
  color: #22c55e;
}
.delete-btn {
  background: #ef4444;
  color: #fff;
  border: none;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>
<div class="container">
  <h1>📊 アンケート回答状況チェック</h1>

  <div class="input-group">
    <input id="newSurveyName" placeholder="アンケート名">
    <input type="date" id="newSurveyDeadline">
    <button id="addButton" class="add-btn">追加</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>アンケート名</th>
        <th>締切</th>
        <th>飯嶋さん</th>
        <th>谷田さん</th>
        <th>本田さん</th>
        <th>徳石さん</th>
        <th>削除</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
// ================= Firebase設定 =================
const firebaseConfig = {
  apiKey: "あなたのAPIキー",
  authDomain: "あなたのauthDomain",
  projectId: "あなたのprojectId"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ===== 店舗固定（今はこれでOK）=====
const SHOP_ID = "test-shop";
const surveysRef = db
  .collection("shops")
  .doc(SHOP_ID)
  .collection("surveys");

let surveyData = [];

// ================= 表示 =================
function renderTable() {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  const users = ["iijima","tanida","honda","tokuishi"];

  surveyData.forEach((row, i) => {
    const tr = document.createElement("tr");

    tr.innerHTML += `<td>${row.name || ""}</td>`;
    tr.innerHTML += `<td>${row.deadline || "-"}</td>`;

    users.forEach(u => {
      const status = row.users?.[u] || false;
      tr.innerHTML += `
        <td>
          <button class="status-btn ${status ? "answered":"unanswered"}"
            data-i="${i}" data-u="${u}">
            ${status ? "回答済":"未回答"}
          </button>
        </td>`;
    });

    tr.innerHTML += `
      <td>
        <button class="delete-btn" data-i="${i}">削除</button>
      </td>`;

    tbody.appendChild(tr);
  });
}

// ================= リアルタイム取得（※orderByしない） =================
surveysRef.onSnapshot(snapshot => {
  surveyData = [];
  snapshot.forEach(doc => {
    surveyData.push({ id: doc.id, ...doc.data() });
  });
  renderTable();
});

// ================= 追加 =================
document.getElementById("addButton").onclick = async () => {
  const name = document.getElementById("newSurveyName").value.trim();
  const deadline = document.getElementById("newSurveyDeadline").value;
  if (!name) return;

  await surveysRef.add({
    name,
    deadline,
    users: {
      iijima:false,
      tanida:false,
      honda:false,
      tokuishi:false
    },
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });

  document.getElementById("newSurveyName").value = "";
  document.getElementById("newSurveyDeadline").value = "";
};

// ================= クリック処理 =================
document.addEventListener("click", async (e) => {

  if (e.target.classList.contains("status-btn")) {
    const i = e.target.dataset.i;
    const u = e.target.dataset.u;
    const data = surveyData[i];

    await surveysRef.doc(data.id).update({
      [`users.${u}`]: !data.users[u]
    });
  }

  if (e.target.classList.contains("delete-btn")) {
    const i = e.target.dataset.i;
    const data = surveyData[i];
    if (confirm("削除しますか？")) {
      await surveysRef.doc(data.id).delete();
    }
  }
});
</script>
</body>
</html>
