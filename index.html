<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アンケート回答状況管理</title>

<!-- ✅ Firebase（ここ絶対このまま） -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<style>
body {
  font-family: 'Helvetica Neue', Arial;
  margin: 0;
  padding: 20px;
  background: #f3f4f6;
}

.container {
  max-width: 950px;
  margin: auto;
  background: #fff;
  padding: 30px;
  border-radius: 12px;
}

h1 {
  text-align: center;
}

.input-group {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

input {
  padding: 10px;
}

.add-btn {
  background: #2563eb;
  color: #fff;
  border: none;
  padding: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #ddd;
  text-align: center;
}

.status-btn {
  border: none;
  padding: 6px 10px;
}

.unanswered {
  background: #fee2e2;
}

.answered {
  background: #dcfce7;
}

.delete-btn {
  background: #ef4444;
  color: white;
  border: none;
}
</style>
</head>

<body>

<div class="container">
<h1>📊 アンケート管理</h1>

<div class="input-group">
<input id="newSurveyName" placeholder="アンケート名">
<input type="date" id="newSurveyDeadline">
<button id="addButton" class="add-btn">追加</button>
</div>

<table>
<thead>
<tr>
<th>名前</th>
<th>締切</th>
<th>飯嶋</th>
<th>谷田</th>
<th>本田</th>
<th>徳石</th>
<th>削除</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

</div>

<script>
// ================= Firebase =================
const firebaseConfig = {
  apiKey: "AIzaSyBhbolbMQlj888NB8_K3nJqA84T_QLtfRg",
  authDomain: "survey-manager-80287.firebaseapp.com",
  projectId: "survey-manager-80287"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const surveysRef = db.collection("surveys");

let surveyData = [];

// ================= 表示 =================
function renderTable() {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  const users = ["iijima","tanida","honda","tokuishi"];

  surveyData.forEach((row, i) => {
    let tr = `<tr>
      <td>${row.name}</td>
      <td>${row.deadline || "-"}</td>`;

    users.forEach(u => {
      const s = row.users?.[u];
      tr += `
      <td>
        <button class="status-btn ${s ? "answered":"unanswered"}"
        data-i="${i}" data-u="${u}">
        ${s ? "回答済":"未回答"}
        </button>
      </td>`;
    });

    tr += `
      <td>
        <button class="delete-btn" data-i="${i}">削除</button>
      </td></tr>`;

    tbody.innerHTML += tr;
  });
}

// ================= リアルタイム =================
surveysRef.orderBy("createdAt","desc")
.onSnapshot(snap => {
  surveyData = [];
  snap.forEach(doc => {
    surveyData.push({ id: doc.id, ...doc.data() });
  });
  renderTable();
});

// ================= 追加 =================
document.getElementById("addButton").onclick = async () => {
  const name = document.getElementById("newSurveyName").value.trim();
  const deadline = document.getElementById("newSurveyDeadline").value;

  if (!name) return;

  await surveysRef.add({
    name,
    deadline,
    users: {
      iijima:false,
      tanida:false,
      honda:false,
      tokuishi:false
    },
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });

  document.getElementById("newSurveyName").value = "";
  document.getElementById("newSurveyDeadline").value = "";
};

// ================= クリック =================
document.addEventListener("click", async (e) => {

  if (e.target.classList.contains("status-btn")) {
    const i = e.target.dataset.i;
    const u = e.target.dataset.u;
    const data = surveyData[i];

    await surveysRef.doc(data.id).update({
      [`users.${u}`]: !data.users[u]
    });
  }

  if (e.target.classList.contains("delete-btn")) {
    const i = e.target.dataset.i;
    const data = surveyData[i];

    if (confirm("削除する？")) {
      await surveysRef.doc(data.id).delete();
    }
  }
});
</script>

</body>
</html>
