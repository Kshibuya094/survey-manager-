<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アンケート管理</title>

<!-- ✅ Firebase（完全に正しい形） -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; background:#f3f4f6; padding:20px; }
.container { max-width:900px; margin:auto; background:#fff; padding:20px; }

.input-group { display:flex; gap:10px; margin-bottom:20px; }
input { padding:10px; }

button { cursor:pointer; }
.add-btn { background:#2563eb; color:#fff; border:none; padding:10px; }

table { width:100%; border-collapse: collapse; }
th, td { padding:10px; border-bottom:1px solid #ccc; text-align:center; }

.unanswered { background:#fee2e2; }
.answered { background:#dcfce7; }

.delete-btn { background:red; color:#fff; border:none; }
</style>
</head>

<body>

<div class="container">
<h2>アンケート管理</h2>

<div class="input-group">
<input id="newSurveyName" placeholder="アンケート名">
<input type="date" id="newSurveyDeadline">
<button id="addButton" class="add-btn">追加</button>
</div>

<table>
<thead>
<tr>
<th>名前</th>
<th>締切</th>
<th>飯嶋</th>
<th>谷田</th>
<th>本田</th>
<th>徳石</th>
<th>削除</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<script>
const firebaseConfig = {
  apiKey: "あなたのAPIキー",
  authDomain: "あなたのauthDomain",
  projectId: "あなたのprojectId"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const surveysRef = db
  .collection("shops")
  .doc("test-shop")
  .collection("surveys");

// ✅ 表示
function renderTable(list) {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  const users = ["iijima","tanida","honda","tokuishi"];

  list.forEach(row => {
    let tr = `<tr>
      <td>${row.name}</td>
      <td>${row.deadline || "-"}</td>`;

    users.forEach(u => {
      const status = row.users?.[u] || false;

      tr += `<td>
        <button class="${status?"answered":"unanswered"}"
          data-id="${row.id}" data-user="${u}">
          ${status?"済":"未"}
        </button>
      </td>`;
    });

    tr += `<td>
      <button class="delete-btn" data-id="${row.id}">削除</button>
    </td></tr>`;

    tbody.innerHTML += tr;
  });
}

// ✅ リアルタイム取得
surveysRef.onSnapshot(snapshot => {
  const list = [];
  snapshot.forEach(doc => {
    list.push({ id:doc.id, ...doc.data() });
  });
  renderTable(list);
});

// ✅ 追加
document.getElementById("addButton").onclick = async () => {
  const name = document.getElementById("newSurveyName").value.trim();
  const deadline = document.getElementById("newSurveyDeadline").value;

  if (!name) return;

  await surveysRef.add({
    name,
    deadline,
    users: {
      iijima:false,
      tanida:false,
      honda:false,
      tokuishi:false
    }
  });

  document.getElementById("newSurveyName").value = "";
  document.getElementById("newSurveyDeadline").value = "";
};

// ✅ 更新・削除（IDベース）
document.addEventListener("click", async (e) => {

  // 更新
  if (e.target.classList.contains("unanswered") ||
      e.target.classList.contains("answered")) {

    const id = e.target.dataset.id;
    const user = e.target.dataset.user;

    const ref = surveysRef.doc(id);
    const snap = await ref.get();
    const data = snap.data();

    await ref.update({
      [`users.${user}`]: !data.users[user]
    });
  }

  // 削除
  if (e.target.classList.contains("delete-btn")) {
    const id = e.target.dataset.id;

    if (confirm("削除する？")) {
      await surveysRef.doc(id).delete();
    }
  }
});
</script>

</body>
</html>
``
