<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アンケート回答状況管理</title>

<!-- Firebase（ここ重要：完全に正しい形） -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<style>
body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 20px; background-color: #f3f4f6; color: #333; }
.container { max-width: 950px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
h1 { font-size: 24px; margin-bottom: 25px; text-align: center; }

.input-group { display: flex; gap: 15px; margin-bottom: 30px; }
input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; }

.add-btn { padding: 10px 20px; background:#2563eb; color:#fff; border:none; border-radius:6px; }

table { width: 100%; border-collapse: collapse; }
th, td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
th { background:#f9fafb; }

.status-btn { padding:6px 14px; border:none; border-radius:20px; }
.unanswered { background:#fee2e2; color:#ef4444; }
.answered { background:#dcfce7; color:#22c55e; }

.delete-btn { background:#ef4444; color:#fff; border:none; padding:6px 10px; border-radius:6px; }
</style>
</head>

<body>

<div class="container">
<h1>📊 アンケート回答状況チェック</h1>

<div class="input-group">
<input type="text" id="newSurveyName" placeholder="アンケート名">
<input type="date" id="newSurveyDeadline">
<button id="addButton" class="add-btn">追加</button>
</div>

<table>
<thead>
<tr>
<th>アンケート名</th>
<th>締切</th>
<th>飯嶋さん</th>
<th>谷田さん</th>
<th>本田さん</th>
<th>徳石さん</th>
<th>操作</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<script>
// ================= Firebase =================
const firebaseConfig = {
  apiKey: "AIzaSyBhbolbMQlj888NB8_K3nJqA84T_QLtfRg",
  authDomain: "survey-manager-80287.firebaseapp.com",
  projectId: "survey-manager-80287"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const surveysRef = db.collection("surveys");

let surveyData = [];

// ================= 描画 =================
function renderTable() {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  const userKeys = ["iijima","tanida","honda","tokuishi"];

  surveyData.forEach((row, rowIndex) => {
    const tr = document.createElement("tr");

    tr.innerHTML += `<td>${row.name}</td>`;

    // 締切
    let deadlineText = row.deadline || "-";
    const deadlineDate = new Date(row.deadline);
    const today = new Date();

    let style = "";
    if (row.deadline && deadlineDate < today) {
      style = 'style="color:red;"';
    }

    tr.innerHTML += `<td ${style}>${deadlineText}</td>`;

    // ステータス
    userKeys.forEach(key => {
      const status = row.users?.[key] || false;

      tr.innerHTML += `
        <td>
          <button class="status-btn ${status ? 'answered':'unanswered'}" 
          data-row="${rowIndex}" data-user="${key}">
          ${status ? "回答済":"未回答"}
          </button>
        </td>`;
    });

    // 削除
    tr.innerHTML += `
      <td>
        <button class="delete-btn" data-row="${rowIndex}">
        削除
        </button>
      </td>`;

    tbody.appendChild(tr);
  });
}

// ================= リアルタイム =================
surveysRef.orderBy("createdAt","desc")
.onSnapshot(snapshot => {
  surveyData = [];
  snapshot.forEach(doc => {
    surveyData.push({
      id: doc.id,
      ...doc.data()
    });
  });
  renderTable();
});

// ================= 追加 =================
document.getElementById("addButton").addEventListener("click", async () => {
  const name = document.getElementById("newSurveyName").value.trim();
  const deadline = document.getElementById("newSurveyDeadline").value;

  if (!name) return alert("名前入力");

  await surveysRef.add({
    name,
    deadline,
    users: {
      iijima:false,
      tanida:false,
      honda:false,
      tokuishi:false
    },
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });

  document.getElementById("newSurveyName").value = "";
  document.getElementById("newSurveyDeadline").value = "";
});

// Enter追加
document.getElementById("newSurveyName")
.addEventListener("keypress", (e) => {
  if (e.key === "Enter") {
    document.getElementById("addButton").click();
  }
});

// ================= クリック =================
document.addEventListener("click", async (e) => {

  // 状態変更
  if (e.target.classList.contains("status-btn")) {
    const rowIdx = e.target.dataset.row;
    const key = e.target.dataset.user;
    const survey = surveyData[rowIdx];

    const newVal = !survey.users[key];

    await surveysRef.doc(survey.id).update({
      [`users.${key}`]: newVal
    });
  }

  // 削除
  if (e.target.classList.contains("delete-btn")) {
    const rowIdx = e.target.dataset.row;
    const survey = surveyData[rowIdx];

    if (confirm("削除する？")) {
      await surveysRef.doc(survey.id).delete();
    }
  }
});
</script>

</body>
</html>
