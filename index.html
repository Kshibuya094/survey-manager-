<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アンケート管理（復旧版）</title>

<!-- ✅ Firebase（正しい形） -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
body { font-family: Arial; background:#f3f4f6; padding:20px; }
.container { max-width:900px; margin:auto; background:#fff; padding:20px; }
.input-group { display:flex; gap:10px; margin-bottom:20px; }
input { padding:10px; }

button { cursor:pointer; }
.add-btn { background:#2563eb; color:#fff; border:none; padding:10px; }

table { width:100%; border-collapse: collapse; }
th, td { padding:10px; border-bottom:1px solid #ccc; text-align:center; }

.unanswered { background:#fee2e2; }
.answered { background:#dcfce7; }

.delete-btn { background:red; color:#fff; border:none; }
</style>
</head>

<body>

<div class="container">
<h2>アンケート管理</h2>

<div class="input-group">
<input id="newSurveyName" placeholder="アンケート名">
<input type="date" id="newSurveyDeadline">
<button id="addButton" class="add-btn">追加</button>
</div>

<table>
<thead>
<tr>
<th>名前</th>
<th>締切</th>
<th>飯嶋</th>
<th>谷田</th>
<th>本田</th>
<th>徳石</th>
<th>削除</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<script>

// ✅ Firebase設定（※ここだけ自分の値に置き換え）
const firebaseConfig = {
  apiKey: "あなたのAPIキー",
  authDomain: "あなたのauthDomain",
  databaseURL: "https://survey-manager-80287-default-rtdb.asia-southeast1.firebasedatabase.app/",
  projectId: "survey-manager-80287"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ✅ 保存先
const ref = db.ref("surveys");

let surveyData = [];
let surveyKeys = [];

// ✅ 描画
function renderTable() {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  const users = ["iijima","tanida","honda","tokuishi"];

  surveyData.forEach((row, i) => {
    let tr = `<tr>
      <td>${row.name}</td>
      <td>${row.deadline || "-"}</td>`;

    users.forEach(u => {
      const s = row.users?.[u];
      tr += `<td>
        <button class="${s ? "answered" : "unanswered"}"
        data-i="${i}" data-u="${u}">
        ${s ? "済" : "未"}
        </button>
      </td>`;
    });

    tr += `<td>
      <button class="delete-btn" data-i="${i}">削除</button>
    </td></tr>`;

    tbody.innerHTML += tr;
  });
}

// ✅ リアルタイム取得
ref.on("value", snap => {
  const data = snap.val() || {};
  surveyData = Object.values(data);
  surveyKeys = Object.keys(data);
  renderTable();
});

// ✅ 追加
document.getElementById("addButton").onclick = async () => {
  const name = document.getElementById("newSurveyName").value.trim();
  const deadline = document.getElementById("newSurveyDeadline").value;

  if (!name) return;

  await ref.push({
    name,
    deadline,
    users: {
      iijima:false,
      tanida:false,
      honda:false,
      tokuishi:false
    }
  });

  document.getElementById("newSurveyName").value = "";
  document.getElementById("newSurveyDeadline").value = "";
};

// ✅ 更新・削除
document.addEventListener("click", async (e) => {

  if (e.target.classList.contains("unanswered") ||
      e.target.classList.contains("answered")) {

    const i = e.target.dataset.i;
    const u = e.target.dataset.u;
    const key = surveyKeys[i];
    const data = surveyData[i];

    await ref.child(key).update({
      ["users/" + u]: !data.users[u]
    });
  }

  if (e.target.classList.contains("delete-btn")) {
    const i = e.target.dataset.i;
    const key = surveyKeys[i];

    if (confirm("削除する？")) {
      await ref.child(key).remove();
    }
  }
});
</script>

</body>
</html>
