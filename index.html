<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アンケート回答状況管理</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; margin: 0; padding: 20px; background:#f3f4f6;}
.container { max-width: 950px; margin:auto; background:#fff; padding:20px; border-radius:10px;}
.input-group { display:flex; gap:10px; margin-bottom:20px;}
input { padding:10px; }
button { cursor:pointer; }
.add-btn { background:#2563eb; color:#fff; border:none; padding:10px;}
table { width:100%; border-collapse: collapse;}
th, td { padding:10px; border-bottom:1px solid #ddd;}
.status-btn { padding:6px 10px; border:none; }
.unanswered { background:#fee2e2; }
.answered { background:#dcfce7; }
.delete-btn { background:#ef4444; color:#fff; border:none;}
</style>
</head>

<body>
<div class="container">
<h2>アンケート管理</h2>

<div class="input-group">
<input type="text" id="newSurveyName" placeholder="アンケート名">
<input type="date" id="newSurveyDeadline">
<button id="addButton" class="add-btn">追加</button>
</div>

<table>
<thead>
<tr>
<th>名前</th>
<th>締切</th>
<th>A</th>
<th>B</th>
<th>C</th>
<th>D</th>
<th>削除</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<script>
// ================= Firebase設定 =================
const firebaseConfig = {
  apiKey: "AIzaSyBhbolbMQlj888NB8_K3nJqA84T_QLtfRg",
  authDomain: "survey-manager-80287.firebaseapp.com",
  projectId: "survey-manager-80287"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const surveysRef = db.collection("surveys");

// ================= データ =================
let surveyData = [];

// ================= 表示 =================
function renderTable() {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  const userKeys = ["a","b","c","d"];

  surveyData.forEach((row, rowIndex) => {
    const tr = document.createElement("tr");

    tr.innerHTML += `<td>${row.name}</td>`;
    tr.innerHTML += `<td>${row.deadline || "-"}</td>`;

    userKeys.forEach(key => {
      const status = row.users?.[key] || false;
      const btnClass = status ? "answered" : "unanswered";

      tr.innerHTML += `
        <td>
          <button class="status-btn ${btnClass}" 
          data-row="${rowIndex}" data-user="${key}">
          ${status ? "済" : "未"}
          </button>
        </td>`;
    });

    tr.innerHTML += `
      <td>
        <button class="delete-btn" data-row="${rowIndex}">
        削除
        </button>
      </td>`;

    tbody.appendChild(tr);
  });
}

// ================= リアルタイム =================
surveysRef.orderBy("createdAt","desc")
.onSnapshot(snapshot => {
  surveyData = [];
  snapshot.forEach(doc => {
    surveyData.push({
      id: doc.id,
      ...doc.data()
    });
  });
  renderTable();
});

// ================= 追加 =================
document.getElementById("addButton").addEventListener("click", async () => {
  const name = document.getElementById("newSurveyName").value.trim();
  const deadline = document.getElementById("newSurveyDeadline").value;

  if (!name) return alert("名前入力");

  await surveysRef.add({
    name,
    deadline,
    users: { a:false, b:false, c:false, d:false },
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });

  document.getElementById("newSurveyName").value = "";
  document.getElementById("newSurveyDeadline").value = "";
});

// ================= クリック =================
document.addEventListener("click", async (e) => {

  // 状態変更
  if (e.target.classList.contains("status-btn")) {
    const rowIdx = e.target.dataset.row;
    const key = e.target.dataset.user;
    const survey = surveyData[rowIdx];

    const newVal = !survey.users[key];

    await surveysRef.doc(survey.id).update({
      [`users.${key}`]: newVal
    });
  }

  // 削除
  if (e.target.classList.contains("delete-btn")) {
    const rowIdx = e.target.dataset.row;
    const survey = surveyData[rowIdx];

    if (confirm("削除する？")) {
      await surveysRef.doc(survey.id).delete();
    }
  }
});
</script>
</body>
</html>
