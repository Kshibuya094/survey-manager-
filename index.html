<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アンケート回答状況チェック</title>

<!-- Firebase SDK（※この2本は絶対この形） -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial, sans-serif; background:#f3f4f6; margin:0; padding:20px; }
.container { max-width:960px; margin:auto; background:#fff; padding:24px; border-radius:12px; }
h1 { text-align:center; margin-bottom:16px; }
.input-group { display:flex; gap:10px; margin-bottom:16px; }
input { padding:10px; border:1px solid #ccc; border-radius:6px; }
button { cursor:pointer; }
.add-btn { background:#2563eb; color:#fff; border:none; padding:10px 16px; border-radius:6px; }
table { width:100%; border-collapse:collapse; }
th, td { padding:10px; border-bottom:1px solid #eee; text-align:center; }
th { background:#f9fafb; }
.status-btn { padding:6px 12px; border-radius:16px; border:none; }
.unanswered { background:#fee2e2; color:#ef4444; }
.answered { background:#dcfce7; color:#22c55e; }
.delete-btn { background:#ef4444; color:#fff; border:none; padding:6px 10px; border-radius:6px; }
</style>
</head>

<body>
<div class="container">
  <h1>📊 アンケート回答状況チェック</h1>

  <div class="input-group">
    <input id="newSurveyName" placeholder="アンケート名">
    <input type="date" id="newSurveyDeadline">
    <button id="addButton" class="add-btn">追加</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>アンケート名</th>
        <th>締切</th>
        <th>飯嶋さん</th>
        <th>谷田さん</th>
        <th>本田さん</th>
        <th>徳石さん</th>
        <th>削除</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
// ===== Firebase設定（ここだけ自分の値に）=====
const firebaseConfig = {
  apiKey: "あなたのAPIキー",
  authDomain: "あなたのauthDomain",
  projectId: "あなたのprojectId"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ===== 保存先（固定）=====
const SHOP_ID = "test-shop";
const surveysRef = db
  .collection("shops")
  .doc(SHOP_ID)
  .collection("surveys");

// ===== 状態 =====
const USERS = ["iijima","tanida","honda","tokuishi"];
const tbody = document.getElementById("tableBody");

// ===== 描画 =====
function render(rows) {
  tbody.innerHTML = "";
  rows.forEach(row => {
    const tr = document.createElement("tr");

    tr.innerHTML += `<td>${row.name || ""}</td>`;
    tr.innerHTML += `<td>${row.deadline || "-"}</td>`;

    USERS.forEach(u => {
      const status = !!(row.users && row.users[u]);
      tr.innerHTML += `
        <td>
          <button class="status-btn ${status ? "answered":"unanswered"}"
            data-id="${row.id}" data-user="${u}">
            ${status ? "回答済":"未回答"}
          </button>
        </td>`;
    });

    tr.innerHTML += `
      <td>
        <button class="delete-btn" data-id="${row.id}">削除</button>
      </td>`;

    tbody.appendChild(tr);
  });
}

// ===== リアルタイム取得（orderByなし）=====
surveysRef.onSnapshot(snap => {
  const rows = [];
  snap.forEach(doc => rows.push({ id: doc.id, ...doc.data() }));
  render(rows);
}, err => {
  console.error("onSnapshot error:", err);
});

// ===== 追加 =====
document.getElementById("addButton").addEventListener("click", async () => {
  const name = document.getElementById("newSurveyName").value.trim();
  const deadline = document.getElementById("newSurveyDeadline").value;
  if (!name) return alert("アンケート名を入力してください");

  try {
    await surveysRef.add({
      name,
      deadline,
      users: { iijima:false, tanida:false, honda:false, tokuishi:false },
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    document.getElementById("newSurveyName").value = "";
    document.getElementById("newSurveyDeadline").value = "";
  } catch (e) {
    console.error("add error:", e);
    alert("追加に失敗しました（Consoleを確認）");
  }
});

// ===== クリック処理（ID直指定）=====
document.addEventListener("click", async (e) => {
  // 状態トグル
  if (e.target.classList.contains("status-btn")) {
    const docId = e.target.dataset.id;
    const user = e.target.dataset.user;
    try {
      const ref = surveysRef.doc(docId);
      const snap = await ref.get();
      const users = snap.data()?.users || {};
      await ref.update({ [`users.${user}`]: !users[user] });
    } catch (err) {
      console.error("update error:", err);
      alert("更新に失敗しました（Consoleを確認）");
    }
  }

  // 削除
  if (e.target.classList.contains("delete-btn")) {
    const docId = e.target.dataset.id;
    if (!confirm("削除しますか？")) return;
    try {
      await surveysRef.doc(docId).delete();
    } catch (err) {
      console.error("delete error:", err);
      alert("削除に失敗しました（Consoleを確認）");
    }
  }
});
</script>
</body>
</html>
